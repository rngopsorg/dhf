name: E2E Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  POSTGRES_USER: ecca
  POSTGRES_PASSWORD: quellcrist
  POSTGRES_DB: ecca_registry
  CORTEX_CHAIN_ID: 1337
  ECCA_EPOCH_INTERVAL_MS: 4000
  ECCA_DIFFICULTY: 4
  OPERATOR_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
  MINIO_ACCESS_KEY: ecca-access
  MINIO_SECRET_KEY: ecca-secret-quellcrist

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('services/_shared/Dockerfile.node', 'forks/*/Dockerfile', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build all images
        run: |
          docker compose build \
            cortical-registry-db \
            working-memory-cache \
            axonal-bus \
            shard-vault \
            medulla-pow \
            hippocampus-dag \
            cortex-evm \
            contracts-deployer \
            siyana-api \
            thalamus-router \
            dhf-compositor \
            needlecast-router-svc \
            quellist-treasury-svc \
            bandwidth-faucet

      - name: Start infrastructure
        run: |
          docker compose up -d \
            cortical-registry-db \
            working-memory-cache \
            axonal-bus \
            shard-vault

      - name: Wait for infrastructure health
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c 'until docker compose exec -T cortical-registry-db pg_isready -U ecca -d ecca_registry; do sleep 2; done'
          echo "Waiting for Redis..."
          timeout 30 bash -c 'until docker compose exec -T working-memory-cache redis-cli ping | grep -q PONG; do sleep 2; done'
          echo "Waiting for NATS..."
          timeout 30 bash -c 'until curl -sf http://localhost:4222/healthz > /dev/null 2>&1 || docker compose exec -T axonal-bus wget -qO- http://localhost:8222/healthz; do sleep 2; done'
          echo "Waiting for MinIO..."
          timeout 30 bash -c 'until curl -sf http://localhost:9000/minio/health/ready; do sleep 2; done'
          echo "Infrastructure healthy."

      - name: Start chain services
        run: |
          docker compose up -d \
            medulla-pow \
            hippocampus-dag \
            cortex-evm

      - name: Wait for chain health
        run: |
          echo "Waiting for medulla-pow..."
          timeout 90 bash -c 'until curl -sf http://localhost:8332/health; do sleep 3; done'
          echo "Waiting for hippocampus-dag..."
          timeout 90 bash -c 'until curl -sf http://localhost:15001/health; do sleep 3; done'
          echo "Waiting for cortex-evm..."
          timeout 120 bash -c 'until curl -sf -X POST http://localhost:8545 -H "content-type: application/json" -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"eth_blockNumber\",\"params\":[]}" | grep -q result; do sleep 3; done'
          echo "Chains healthy."

      - name: Deploy contracts
        run: |
          docker compose up contracts-deployer
          echo "Contracts deployed."

      - name: Start application services
        run: |
          docker compose up -d \
            siyana-api \
            thalamus-router \
            dhf-compositor \
            needlecast-router-svc \
            quellist-treasury-svc \
            bandwidth-faucet

      - name: Wait for application health
        run: |
          echo "Waiting for siyana-api..."
          timeout 90 bash -c 'until curl -sf http://localhost:7070/healthz; do sleep 3; done'
          echo "Application services healthy."
          # Give thalamus/quellist a moment to subscribe to NATS
          sleep 5

      - name: Run E2E test suite
        run: bash .github/tests/e2e.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Container Status ==="
          docker compose ps
          echo ""
          echo "=== siyana-api logs ==="
          docker compose logs siyana-api --tail 50
          echo ""
          echo "=== thalamus-router logs ==="
          docker compose logs thalamus-router --tail 30
          echo ""
          echo "=== needlecast-router-svc logs ==="
          docker compose logs needlecast-router-svc --tail 30
          echo ""
          echo "=== quellist-treasury-svc logs ==="
          docker compose logs quellist-treasury-svc --tail 30
          echo ""
          echo "=== contracts-deployer logs ==="
          docker compose logs contracts-deployer --tail 30
          echo ""
          echo "=== medulla-pow logs ==="
          docker compose logs medulla-pow --tail 20
          echo ""
          echo "=== hippocampus-dag logs ==="
          docker compose logs hippocampus-dag --tail 20

      - name: Teardown
        if: always()
        run: docker compose down -v --remove-orphans

