# =============================================================================
# ECCA Stack v3 — Production-grade single-host topology (~24 services).
# Use docker-compose.distributed.yml for Swarm/multi-host deployments.
# =============================================================================
version: "3.9"

name: ecca

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

x-ts-base: &ts-base
  build:
    context: .
    dockerfile: services/_shared/Dockerfile.node
  env_file: .env
  depends_on:
    cortical-registry-db: { condition: service_healthy }
    working-memory-cache:  { condition: service_healthy }
    axonal-bus:            { condition: service_healthy }
  networks: [ecca-net]
  logging: *default-logging
  <<: *default-restart

networks:
  ecca-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  nats-data:
  minio-data:
  medulla-chaindata:
  cortex-chaindata:
  hippocampus-blockstore:
  prometheus-data:
  grafana-data:
  loki-data:
  ollama-data:

services:
  # ───────────────────────── DATA PLANE ──────────────────────────────────────

  cortical-registry-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quellcrist}
      POSTGRES_DB: ${POSTGRES_DB:-ecca_registry}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./packages/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecca -d ecca_registry"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  working-memory-cache:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes: ["redis-data:/data"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  axonal-bus:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes: ["nats-data:/data"]
    ports: ["4222:4222", "8222:8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  shard-vault:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ecca-access}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-ecca-secret-quellcrist}
    volumes: ["minio-data:/data"]
    ports: ["9000:9000", "9001:9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  # ───────────────────────── CHAIN LAYER ─────────────────────────────────────

  # Cortical Anchor Chain — patched btcd (PoW + Synaptic-Field MMR + OP_COHERENCE_ROOT)
  medulla-pow:
    build:
      context: ./forks/medulla-pow-go
      dockerfile: Dockerfile
    environment:
      ECCA_DIFFICULTY: ${ECCA_DIFFICULTY:-4}
      ECCA_EPOCH_INTERVAL_MS: ${ECCA_EPOCH_INTERVAL_MS:-4000}
    volumes: ["medulla-chaindata:/data"]
    ports: ["8332:8332", "8333:8333"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8332/health"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  # DHF Memory Lattice — patched kubo-style DAG with epoch-tagged CIDs
  hippocampus-dag:
    build:
      context: ./forks/hippocampus-dag-go
      dockerfile: Dockerfile
    depends_on:
      shard-vault: { condition: service_healthy }
    environment:
      MINIO_ENDPOINT: shard-vault:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ecca-access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-ecca-secret-quellcrist}
      MINIO_BUCKET: ${MINIO_BUCKET:-hippocampus-shards}
      CORTEX_RPC: http://cortex-evm:8545
    volumes: ["hippocampus-blockstore:/data"]
    ports: ["5001:5001", "8080:8080", "4001:4001"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  # Synaptic Stack — geth in Clique PoA mode + ECCA custom genesis
  cortex-evm:
    image: ethereum/client-go:v1.14.8
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      if [ ! -d /data/geth ]; then
        echo '[cortex-evm] initializing genesis…'
        geth init --datadir /data /genesis/genesis.json
        cp /genesis/keystore/* /data/keystore/ 2>/dev/null || true
      fi
      exec geth \
        --datadir /data \
        --networkid 131072 \
        --http --http.addr 0.0.0.0 --http.port 8545 \
        --http.api eth,net,web3,debug,txpool,clique,personal \
        --http.corsdomain '*' --http.vhosts '*' \
        --ws --ws.addr 0.0.0.0 --ws.port 8546 --ws.api eth,net,web3,debug,clique \
        --ws.origins '*' \
        --mine --miner.etherbase 0x0000000000000000000000000000000000000ECC \
        --allow-insecure-unlock --unlock 0x0000000000000000000000000000000000000ECC \
        --password /genesis/password.txt \
        --syncmode full --gcmode archive \
        --nodiscover --maxpeers 0
      "
    volumes:
      - cortex-chaindata:/data
      - ./forks/cortex-evm-go/genesis:/genesis:ro
    ports: ["8545:8545", "8546:8546"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"eth_blockNumber\",\"params\":[]}' --header='content-type: application/json' http://localhost:8545 | grep -q result"]
      interval: 5s
      timeout: 3s
      retries: 60
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  # One-shot: deploy all Solidity contracts after cortex-evm comes up.
  contracts-deployer:
    build:
      context: .
      dockerfile: contracts/Dockerfile
    depends_on:
      cortex-evm: { condition: service_healthy }
    environment:
      CORTEX_RPC: http://cortex-evm:8545
      OPERATOR_PRIVATE_KEY: ${OPERATOR_PRIVATE_KEY}
    volumes:
      - ./contracts/deployments:/app/deployments
    networks: [ecca-net]
    logging: *default-logging
    restart: "no"

  # ─────────────────────── CORE ORCHESTRATION ────────────────────────────────

  synapse-api:
    <<: *ts-base
    command: ["node", "services/synapse-api/dist/server.js"]
    depends_on:
      cortical-registry-db: { condition: service_healthy }
      working-memory-cache: { condition: service_healthy }
      axonal-bus:           { condition: service_healthy }
      cortex-evm:           { condition: service_healthy }
      hippocampus-dag:      { condition: service_healthy }
      medulla-pow:          { condition: service_healthy }
    ports: ["7070:7070"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7070/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30

  thalamus-router:
    <<: *ts-base
    command: ["node", "services/thalamus-router/dist/server.js"]

  dhf-compositor:
    <<: *ts-base
    command: ["node", "services/dhf-compositor/dist/server.js"]

  needlecast-router-svc:
    <<: *ts-base
    command: ["node", "services/needlecast-router-svc/dist/server.js"]

  quellist-treasury-svc:
    <<: *ts-base
    command: ["node", "services/quellist-treasury-svc/dist/server.js"]

  bandwidth-faucet:
    <<: *ts-base
    command: ["node", "services/bandwidth-faucet/dist/server.js"]

  # ─────────────────────── WORKERS ───────────────────────────────────────────

  epoch-anchor-worker:
    <<: *ts-base
    command: ["node", "workers/runner/dist/server.js"]
    environment: { WORKER_KIND: epoch-anchor }

  drift-detector-worker:
    <<: *ts-base
    command: ["node", "workers/runner/dist/server.js"]
    environment: { WORKER_KIND: drift-detector }

  residue-collector-worker:
    <<: *ts-base
    command: ["node", "workers/runner/dist/server.js"]
    environment: { WORKER_KIND: residue-collector }

  memory-reconciler-worker:
    <<: *ts-base
    command: ["node", "workers/runner/dist/server.js"]
    environment: { WORKER_KIND: memory-reconciler }

  pinning-service-worker:
    <<: *ts-base
    command: ["node", "workers/runner/dist/server.js"]
    environment: { WORKER_KIND: pinning-service }

  bandwidth-meter-worker:
    <<: *ts-base
    command: ["node", "workers/runner/dist/server.js"]
    environment: { WORKER_KIND: bandwidth-meter }

  # ─────────────────────── SLEEVE FLEET ──────────────────────────────────────

  sleeve-runtime-human:
    <<: *ts-base
    command: ["node", "services/sleeve-runtime/dist/server.js"]
    environment:
      SLEEVE_KIND: human
    deploy: { replicas: 1 }

  sleeve-runtime-ai:
    <<: *ts-base
    command: ["node", "services/sleeve-runtime/dist/server.js"]
    environment:
      SLEEVE_KIND: ai
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
    deploy: { replicas: 2 }

  sleeve-runtime-mining:
    <<: *ts-base
    command: ["node", "services/sleeve-runtime/dist/server.js"]
    environment:
      SLEEVE_KIND: mining
    deploy: { replicas: 1 }

  sleeve-runtime-memory:
    <<: *ts-base
    command: ["node", "services/sleeve-runtime/dist/server.js"]
    environment:
      SLEEVE_KIND: memory
    deploy: { replicas: 1 }

  # Optional local LLM for offline AI sleeve operation
  ollama:
    image: ollama/ollama:latest
    volumes: ["ollama-data:/root/.ollama"]
    ports: ["11434:11434"]
    networks: [ecca-net]
    logging: *default-logging
    profiles: ["ai-local"]
    <<: *default-restart

  # ─────────────────────── OBSERVABILITY ─────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports: ["9090:9090"]
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: quellcrist
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/observability/grafana-provisioning:/etc/grafana/provisioning:ro
    ports: ["${GRAFANA_PORT:-3030}:3000"]
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./deploy/observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports: ["3100:3100"]
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686", "14268:14268", "4317:4317", "4318:4318"]
    networks: [ecca-net]
    logging: *default-logging
    <<: *default-restart
