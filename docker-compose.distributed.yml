# Distributed Swarm overlay — pin chains to dedicated nodes, scale sleeves and workers.
version: "3.9"
services:
  medulla-pow:
    deploy:
      replicas: 1
      placement: { constraints: [node.labels.role==chain] }
      resources: { limits: { cpus: "2", memory: "2g" } }

  hippocampus-dag:
    deploy:
      replicas: 1
      placement: { constraints: [node.labels.role==chain] }

  cortex-evm:
    deploy:
      replicas: 1
      placement: { constraints: [node.labels.role==chain] }

  cortical-registry-db:
    deploy:
      replicas: 1
      placement: { constraints: [node.labels.role==data] }

  axonal-bus:
    deploy:
      replicas: 3
      placement: { constraints: [node.labels.role==data] }

  siyana-api:
    deploy:
      replicas: 3
      update_config: { parallelism: 1, delay: 10s, order: start-first }

  thalamus-router:
    deploy:
      replicas: 1   # exactly-once epoch arbiter

  needlecast-router-svc:
    deploy: { replicas: 2 }
  dhf-compositor:
    deploy: { replicas: 2 }

  sleeve-runtime-human:
    deploy: { replicas: 5 }
  sleeve-runtime-ai:
    deploy: { replicas: 8, placement: { constraints: [node.labels.role==compute] } }
  sleeve-runtime-mining:
    deploy: { replicas: 3 }
  sleeve-runtime-memory:
    deploy: { replicas: 3 }

  epoch-anchor-worker:
    deploy: { replicas: 1 }
  drift-detector-worker:
    deploy: { replicas: 2 }
  residue-collector-worker:
    deploy: { replicas: 2 }
  memory-reconciler-worker:
    deploy: { replicas: 2 }
  pinning-service-worker:
    deploy: { replicas: 3 }
  bandwidth-meter-worker:
    deploy: { replicas: 1 }
