{{- range $name, $cfg := dict "medulla-pow" (dict "port" 8332) "hippocampus-dag" (dict "port" 5001) "cortex-evm" (dict "port" 8545) }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  serviceName: {{ $name }}
  selector: { matchLabels: { app: {{ $name }} } }
  template:
    metadata: { labels: { app: {{ $name }} } }
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.image.registry }}/ecca-{{ $name }}:{{ $.Values.global.image.tag }}"
          ports: [{ containerPort: {{ $cfg.port }} }]
          readinessProbe:
            httpGet: { path: /health, port: {{ $cfg.port }} }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: {{ $cfg.port }} }
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata: { name: {{ $name }} }
spec:
  selector: { app: {{ $name }} }
  ports: [{ port: {{ $cfg.port }}, targetPort: {{ $cfg.port }} }]
{{- end }}
