# Shared values used by every chart in deploy/k8s/.
global:
  image:
    registry: ghcr.io/your-org
    tag: v3.0.0
    pullPolicy: IfNotPresent

ecca:
  chainId: 131072
  epochIntervalMs: 4000
  driftMax: 15
  fidelityMin: 0.6
  emissionPerEpoch: 100

postgres:
  user: ecca
  database: ecca
  existingSecret: ecca-postgres
  persistence: { size: 20Gi, storageClass: standard }

redis:
  persistence: { size: 5Gi }

nats:
  jetstream: { enabled: true, fileStorage: { size: 10Gi } }

minio:
  persistence: { size: 100Gi }

medulla:
  difficulty: 4
  resources: { requests: { cpu: 1, memory: 1Gi }, limits: { cpu: 2, memory: 2Gi } }

hippocampus:
  resources: { requests: { cpu: 500m, memory: 512Mi } }

cortex:
  resources: { requests: { cpu: 1, memory: 1Gi } }

siyana:
  replicas: 3
  hpa: { enabled: true, min: 3, max: 10, targetCPU: 70 }

sleeves:
  human: { replicas: 5 }
  ai:    { replicas: 8 }
  mining:{ replicas: 3 }
  memory:{ replicas: 3 }

observability:
  prometheus: { retention: 15d }
  grafana:    { adminPassword: change-me }
