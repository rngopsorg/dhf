# ═══════════════════════════════════════════════════════════════════════
#  Services — Siyana API + Thalamus Router per region
#  Each region gets its own API and epoch router, sharing the same
#  Postgres/Redis/NATS from ecca-shared.
# ═══════════════════════════════════════════════════════════════════════

# ═════════════════════ REGION-STORAGE ════════════════════════════════

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siyana-api
  namespace: region-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: siyana-api
  template:
    metadata:
      labels:
        app: siyana-api
        ecca.io/region: storage
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: siyana
          image: ecca-siyana-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 7070
          env:
            - name: DATABASE_URL
              value: "postgresql://ecca:quellcrist@postgres.ecca-shared:5432/ecca_registry"
            - name: REDIS_URL
              value: "redis://redis.ecca-shared:6379"
            - name: NATS_URL
              value: "nats://nats.ecca-shared:4222"
            - name: CORTEX_RPC
              value: "http://cortex-evm.region-storage:8545"
            - name: CORTEX_WS
              value: "ws://cortex-evm.region-storage:8546"
            - name: CORTEX_CHAIN_ID
              value: "131072"
            - name: MEDULLA_RPC
              value: "http://medulla-pow.region-storage:8332"
            - name: HIPPOCAMPUS_API
              value: "http://hippocampus-dag.region-storage:5001"
            - name: ECCA_EPOCH_INTERVAL_MS
              value: "4000"
            - name: OPERATOR_PRIVATE_KEY
              value: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
            - name: ECCA_REGION
              value: "region-storage"
            - name: PRISMA_QUERY_ENGINE_LIBRARY
              value: "/app/node_modules/.pnpm/@prisma+client@5.22.0_prisma@5.22.0/node_modules/.prisma/client/libquery_engine-linux-musl-arm64-openssl-3.0.x.so.node"
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 7070 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: siyana-api
  namespace: region-storage
spec:
  selector: { app: siyana-api }
  ports:
    - port: 7070
      targetPort: 7070

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thalamus-router
  namespace: region-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thalamus-router
  template:
    metadata:
      labels:
        app: thalamus-router
        ecca.io/region: storage
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: thalamus
          image: ecca-thalamus-router:local
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: "postgresql://ecca:quellcrist@postgres.ecca-shared:5432/ecca_registry"
            - name: REDIS_URL
              value: "redis://redis.ecca-shared:6379"
            - name: NATS_URL
              value: "nats://nats.ecca-shared:4222"
            - name: CORTEX_RPC
              value: "http://cortex-evm.region-storage:8545"
            - name: CORTEX_WS
              value: "ws://cortex-evm.region-storage:8546"
            - name: CORTEX_CHAIN_ID
              value: "131072"
            - name: MEDULLA_RPC
              value: "http://medulla-pow.region-storage:8332"
            - name: HIPPOCAMPUS_API
              value: "http://hippocampus-dag.region-storage:5001"
            - name: ECCA_EPOCH_INTERVAL_MS
              value: "4000"
            - name: OPERATOR_PRIVATE_KEY
              value: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
            - name: ECCA_REGION
              value: "region-storage"
            - name: PRISMA_QUERY_ENGINE_LIBRARY
              value: "/app/node_modules/.pnpm/@prisma+client@5.22.0_prisma@5.22.0/node_modules/.prisma/client/libquery_engine-linux-musl-arm64-openssl-3.0.x.so.node"
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }

